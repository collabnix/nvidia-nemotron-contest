name: 🚀 Contest Submission
description: Submit your project for the NVIDIA Nemotron 3 Super Build Contest
title: "[SUBMISSION] <Your project name>"
labels: ["submission", "needs-review"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Welcome, builder.

        Thanks for shipping something with NVIDIA Nemotron 3 Super. Fill this out carefully — judges read every field, and your submission becomes part of the public submissions wall the moment you hit submit.

        **Before you submit, make sure you have:**
        - ✅ A public GitHub repository with your project code
        - ✅ An **architecture diagram** in the README
        - ✅ A **YouTube demo video** (link ready to paste)
        - ✅ A **blog post** about your project, shared on social media
        - ✅ Used the hashtags `#NVIDIA` `#Nemotron` and called out the Bengaluru meetup in your social posts
        - ✅ Project fits one of the 4 tracks shared by Docker Bangalore organizers

        **Deadline: 25 May 2026**

        ---

  - type: input
    id: project_name
    attributes:
      label: Project Name
      description: Short, memorable. This is what people will see on the wall.
      placeholder: e.g. BenefitsPath, MaintainerBot, MeetingExplainer
    validations:
      required: true

  - type: input
    id: tagline
    attributes:
      label: One-line Tagline
      description: Describe your project in a single sentence (max 140 chars).
      placeholder: e.g. Plain-language guide that helps users find and apply for the right public benefits.
    validations:
      required: true

  - type: dropdown
    id: track
    attributes:
      label: Submission Track
      description: Pick one. Your project must fit one of the four tracks shared at the meetup.
      options:
        - "Track 1 — Community Benefits Navigator"
        - "Track 2 — Open-Source Maintainer Copilot for Small Community Projects"
        - "Track 3 — Local Governance / Public Meeting Explainer"
        - "Track 4 — Crisis Information and Resource Routing Assistant"
    validations:
      required: true

  - type: input
    id: repo_url
    attributes:
      label: GitHub Repository URL
      description: Must be a public GitHub repo. The README must include an architecture diagram.
      placeholder: https://github.com/your-username/your-project
    validations:
      required: true

  - type: input
    id: youtube_url
    attributes:
      label: YouTube Demo Video URL
      description: Required. Walk through what your project does and how it uses Nemotron 3 Super.
      placeholder: https://youtube.com/watch?v=...
    validations:
      required: true

  - type: input
    id: blog_url
    attributes:
      label: Blog Post URL
      description: Required. A blog post about your project — Medium, Dev.to, Hashnode, your own blog, all fine.
      placeholder: https://medium.com/@you/your-post
    validations:
      required: true

  - type: textarea
    id: social_posts
    attributes:
      label: Social Media Post Links
      description: |
        Paste links to your social media posts about the project. Posts must include `#NVIDIA` `#Nemotron` and call out the Bengaluru meetup. LinkedIn, X/Twitter, both fine.
      placeholder: |
        https://www.linkedin.com/posts/...
        https://x.com/...
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What did you build?
      description: |
        Walk us through it in 3–5 paragraphs. What problem does it solve? How does Nemotron 3 Super fit in? What's the technical approach? What worked, what didn't? Be specific.
      placeholder: |
        We built X to solve Y...

        Architecture: ...

        Where Nemotron 3 Super fits in: ...

        Trade-offs we made: ...
    validations:
      required: true

  - type: textarea
    id: nemotron_usage
    attributes:
      label: How are you using Nemotron 3 Super?
      description: |
        Be specific. Which inference setup (TensorRT, vLLM, Triton, HuggingFace, local)? Long context? Tool calling? Agentic workflow? Why did you pick Nemotron over alternatives?
      placeholder: |
        - Inference: vLLM with bf16 on a single A100
        - Why Nemotron: long context window let us avoid chunking entirely on policy PDFs
        - Tool calling: yes, used for...
    validations:
      required: true

  - type: textarea
    id: setup_instructions
    attributes:
      label: How to run it (quick steps)
      description: Copy-paste the key commands. If it's `git clone && docker compose up`, say so.
      placeholder: |
        ```bash
        git clone https://github.com/you/your-project
        cd your-project
        docker compose up
        ```
      render: markdown
    validations:
      required: true

  - type: input
    id: team_size
    attributes:
      label: Team size
      description: 1 to 4 people. Solo is fine.
      placeholder: e.g. 2
    validations:
      required: true

  - type: textarea
    id: team_members
    attributes:
      label: Team members
      description: GitHub handles + roles. One per line. Solo? Just put yourself.
      placeholder: |
        @alice — backend, Nemotron integration
        @bob — frontend, demo video
    validations:
      required: true

  - type: input
    id: contact_email
    attributes:
      label: Contact email
      description: Used only to reach you about prize delivery / judging questions. Not made public.
      placeholder: you@example.com
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location (city, country)
      description: For the public submissions wall. Optional.
      placeholder: e.g. Bengaluru, India
    validations:
      required: false

  - type: textarea
    id: additional_notes
    attributes:
      label: Anything else judges should know?
      description: Optional. Acknowledgements, known limitations, what you'd build next.
      placeholder: ""
    validations:
      required: false

  - type: checkboxes
    id: agreements
    attributes:
      label: Submission checklist
      description: All required.
      options:
        - label: My project is on a public GitHub repo with an architecture diagram in the README.
          required: true
        - label: I have recorded a YouTube demo video and the link is included above.
          required: true
        - label: I have published a blog post about the project and the link is included above.
          required: true
        - label: I have shared the project on social media with `#NVIDIA` `#Nemotron` and called out the Bengaluru meetup.
          required: true
        - label: My project fits one of the four contest tracks defined by Docker Bangalore organizers.
          required: true
        - label: I understand my submission is public and may be featured by Collabnix, Docker Bangalore, and NVIDIA (with credit).
          required: true
