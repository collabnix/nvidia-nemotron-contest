name: Process Submission

on:
  issues:
    types: [opened, edited]

jobs:
  process:
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Parse and validate submission
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';

            const trackMatch = body.match(/### Submission Track\s*\n\s*(Track \d+[^\n]*)/);
            const track = trackMatch ? trackMatch[1].trim() : null;

            const repoMatch = body.match(/### GitHub Repository URL\s*\n\s*(https?:\/\/[^\s]+)/);
            const repoUrl = repoMatch ? repoMatch[1].trim() : null;

            const ytMatch = body.match(/### YouTube Demo Video URL\s*\n\s*(https?:\/\/[^\s]+)/);
            const ytUrl = ytMatch ? ytMatch[1].trim() : null;

            const labels = [];
            if (track) {
              const trackNum = track.match(/Track (\d)/);
              if (trackNum && ['1','2','3','4'].includes(trackNum[1])) {
                labels.push(`track-${trackNum[1]}`);
              }
            }

            const isValidRepo = repoUrl && /^https:\/\/github\.com\/[\w-]+\/[\w.-]+/.test(repoUrl);
            const isValidYT = ytUrl && /youtu(be\.com|\.be)/.test(ytUrl);

            if (!isValidRepo || !isValidYT) labels.push('needs-fix');

            if (labels.length) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labels
              });
            }

            if (context.payload.action !== 'opened') return;

            const issues = []
            if (!isValidRepo) issues.push('GitHub repository URL appears missing or malformed');
            if (!isValidYT) issues.push('YouTube demo video URL appears missing or malformed');

            const welcomeBody = issues.length === 0
              ? `## 🎉 Submission received!

Thanks for shipping, @${issue.user.login}. Your project is now part of the public submissions wall.

**What happens next:**
- Your submission appears live on the contest portal within minutes
- Judges review during the judging window after the deadline (25 May 2026)
- Community can react with 👍 / 🚀 / ❤️

**While you wait:**
- ⭐ Star this repo
- Drop into the Collabnix Slack
- Check out other submissions

If you need to update something, just edit this issue.

_Submitted: ${new Date().toUTCString()}_`
              : `## ⚠️ Submission needs a fix

Thanks for submitting, @${issue.user.login}. We've labeled this \`needs-fix\` because:

${issues.map(i => `- ${i}`).join('\n')}

Please edit this issue to provide valid links. Once fixed, the \`needs-fix\` label will be removed automatically.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: welcomeBody
            });

      - name: Remove needs-fix on valid edit
        if: github.event.action == 'edited'
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body || '';
            const repoMatch = body.match(/### GitHub Repository URL\s*\n\s*(https?:\/\/[^\s]+)/);
            const ytMatch = body.match(/### YouTube Demo Video URL\s*\n\s*(https?:\/\/[^\s]+)/);
            const repoUrl = repoMatch ? repoMatch[1].trim() : null;
            const ytUrl = ytMatch ? ytMatch[1].trim() : null;
            const isValidRepo = repoUrl && /^https:\/\/github\.com\/[\w-]+\/[\w.-]+/.test(repoUrl);
            const isValidYT = ytUrl && /youtu(be\.com|\.be)/.test(ytUrl);

            if (isValidRepo && isValidYT) {
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.issue.number,
                  name: 'needs-fix'
                });
              } catch (e) {}
            }
