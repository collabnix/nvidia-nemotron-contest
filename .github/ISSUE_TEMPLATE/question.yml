name: ❓ Question / Help
description: Ask a question about the contest, rules, technical setup, or anything else
title: "[QUESTION] <Your question>"
labels: ["question"]

body:
  - type: markdown
    attributes:
      value: |
        Quick check before posting:
        - Have you read the [FAQ](https://contest.collabnix.com/#faq)?
        - Is your question better suited for the [Collabnix Slack](https://collabnix.com)? (Faster replies for code/setup help.)

        If still relevant, ask away.

  - type: textarea
    id: question
    attributes:
      label: Your question
      placeholder: What would you like to know?
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - "Rules & eligibility"
        - "Submission process"
        - "Technical / setup"
        - "Prizes & judging"
        - "Other"
    validations:
      required: true
